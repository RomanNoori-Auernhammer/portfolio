<header
  class="fixed top-0 left-0 right-0 z-40 transition-all duration-300"
  [class]="isScrolled()
    ? 'bg-white/80 dark:bg-ink-950/80 backdrop-blur-lg shadow-sm border-b border-ink-200 dark:border-ink-800'
    : ''"
>
  <nav class="container-custom flex h-16 items-center justify-between" aria-label="Hauptnavigation">
    <a routerLink="/" fragment="home" class="group flex items-center gap-2 font-display font-bold text-lg">
      <span class="flex h-9 w-9 items-center justify-center rounded-lg
                   bg-gradient-to-br from-brand-400 to-brand-600
                   text-white font-bold text-sm shadow-lg shadow-brand-500/30
                   transition-transform group-hover:scale-110" aria-hidden="true">RN</span>
      <span class="hidden sm:inline">Roman<span class="text-brand-500">.</span></span>
    </a>

    <ul class="hidden md:flex items-center gap-1" role="list">
      @for (item of navItems; track item.fragment) {
        <li>
          <a [routerLink]="['/']" [fragment]="item.fragment"
             class="px-4 py-2 text-sm font-medium text-ink-700 dark:text-ink-300
                    transition-colors hover:text-brand-500 dark:hover:text-brand-400 rounded-md">
            {{ 'nav.' + item.key | translate }}
          </a>
        </li>
      }
    </ul>

    <div class="flex items-center gap-2">
      <app-language-switcher />
      <app-theme-toggle />
      <button type="button"
        class="md:hidden inline-flex h-9 w-9 items-center justify-center rounded-full
               border border-ink-200 dark:border-ink-700 text-ink-700 dark:text-ink-200
               transition-colors hover:border-brand-500 hover:text-brand-500"
        (click)="toggleMobileMenu()"
        [attr.aria-expanded]="isMobileMenuOpen()"
        aria-controls="mobile-menu" aria-label="Menü">
        @if (isMobileMenuOpen()) {
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        } @else {
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        }
      </button>
    </div>
  </nav>

  @if (isMobileMenuOpen()) {
    <div id="mobile-menu"
      class="md:hidden border-t border-ink-200 dark:border-ink-800 bg-white dark:bg-ink-950 animate-fade-in-up">
      <ul class="container-custom py-4 space-y-1" role="list">
        @for (item of navItems; track item.fragment) {
          <li>
            <a [routerLink]="['/']" [fragment]="item.fragment" (click)="closeMobileMenu()"
               class="block px-4 py-3 text-base font-medium rounded-lg
                      text-ink-700 dark:text-ink-300
                      hover:bg-brand-500/10 hover:text-brand-500">
              {{ 'nav.' + item.key | translate }}
            </a>
          </li>
        }
      </ul>
    </div>
  }
</header>
